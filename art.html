<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>See — Vikamat</title>

  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/site.css" />

  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
    data-cf-beacon='{"token":"ba6df2a0397d42bd9c072756f467bf76"}'></script>

  <script defer src="./js/layout.js"></script>

  <style>
    .postsWrap{ margin-top: 14px; max-width: 1000px; }
    a.postRow{
      display:block;
      text-decoration:none;
      border-radius:18px;
      padding:16px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.90);
      margin-bottom:12px;
    }
    a.postRow:hover{ background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.18); }
    .emptyState{
      margin-top: 10px;
      padding: 14px;
      border-radius: 18px;
      border: 1px dashed rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>

<body>
  <div id="vk-page">
    <section>
      <h1>See</h1>
      <p class="lead" style="max-width: 80ch; color: rgba(255,255,255,0.86);">
        Photography • Visual storytelling
      </p>

      <div class="postsWrap">
        <div id="postsMountArt"></div>
        <div id="artEmpty" class="emptyState" style="display:none;">
          No Art posts yet. Add items to <code>data/posts.js</code> with <code>tag: "art"</code>.
        </div>
      </div>
    </section>
  </div>

  <script src="./data/posts.js"></script>
  <script src="./js/posts.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const mount = document.getElementById("postsMountArt");
      const empty = document.getElementById("artEmpty");

      if (typeof window.VK_RENDER_POSTS === "function") {
        window.VK_RENDER_POSTS({ mountId: "postsMountArt", filterTag: "art" });
        setTimeout(() => {
          const hasCards = mount && mount.querySelector("a.postRow");
          if (empty) empty.style.display = hasCards ? "none" : "block";
        }, 0);
      } else {
        if (empty) empty.style.display = "block";
      }
    });
  </script>
</body>
</html>
